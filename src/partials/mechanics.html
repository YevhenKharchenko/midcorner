<section class="mechanics-section section" id="mechanics">
  <div class="mechanics-bg-wrapper">
    <div class="container mechanics-container">
      <h2 class="section-title mechanics-title">Core Gameplay</h2>
      <div class="mechanics-swiper-container">
        <ul class="swiper-wrapper mechanics-swiper-wrapper">
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img1.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img2.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img3.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img4.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img5.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
          <li class="swiper-slide mechanics-slide">
            <img
              class="mechanics-img"
              src="./img/mechanics/mechanics-img6.png"
              alt="Screenshot of the game"
              width="305"
              height="245"
              loading="lazy"
            />
          </li>
        </ul>
      </div>
      <div class="controls mechanics-controls">
        <button
          class="arrow-btn"
          id="mechanicsLeftArrow"
          aria-label="Previous slide"
        >
          <svg class="arrow-icon" width="34" height="34">
            <use href="./img/sprite.svg#icon-arrow-left"></use>
          </svg>
        </button>
        <button
          class="arrow-btn"
          id="mechanicsRightArrow"
          aria-label="Next slide"
        >
          <svg class="arrow-icon" width="34" height="34">
            <use href="./img/sprite.svg#icon-arrow-right"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
